<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#1A1A1A"/>
  <!-- Sun rays -->
  <g stroke="#C8963E" stroke-width="2.5" stroke-linecap="round">
    <line x1="32" y1="10" x2="32" y2="5"/>
    <line x1="44" y1="14" x2="47" y2="10"/>
    <line x1="50" y1="26" x2="55" y2="24"/>
    <line x1="20" y1="14" x2="17" y2="10"/>
    <line x1="14" y1="26" x2="9" y2="24"/>
  </g>
  <!-- Sun semicircle -->
  <path d="M16 36 A16 16 0 0 1 48 36" fill="#C8963E"/>
  <!-- Horizon line -->
  <rect x="10" y="35" width="44" height="3" rx="1.5" fill="#E8C97A"/>
  <!-- Ground -->
  <rect x="10" y="38" width="44" height="14" rx="3" fill="#C8963E" opacity="0.3"/>
</svg>
